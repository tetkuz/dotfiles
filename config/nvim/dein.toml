[[plugins]]
repo = 'nvim-treesitter/nvim-treesitter'
rev = 'master'
hook_post_update = 'TSUpdate'
hook_post_source = '''
lua << EOF
require('nvim-treesitter.configs').setup({
  ensure_installed = { 'json', 'jsonc', 'yaml', 'toml', 'lua', 'vim', 'vimdoc', 'typescript', 'tsx', 'javascript', 'bash', 'markdown', 'markdown_inline' },
  highlight = { enable = true },
})
EOF
'''

[[plugins]]
repo = 'kevinhwang91/nvim-ufo'
depends = ['nvim-treesitter']
hook_add = '''
lua << EOF
require('ufo').setup({
  provider_selector = function(_, filetype)
    if filetype == 'markdown' then return '' end
    return {'treesitter','indent'}
  end,
})
vim.o.foldlevel = 99
vim.o.foldlevelstart = 99
vim.o.foldenable = true
EOF
'''

# UserInterface {{{

[[plugins]]
repo = 'majutsushi/tagbar'
hook_add = '''
  nnoremap <silent> <leader>t :TagbarToggle<CR>

  let g:tagbar_iconchars = ['+', '-']

  let g:tagbar_type_typescript = {
    \ 'ctagsbin' : 'tstags',
    \ 'ctagsargs' : '-f-',
    \ 'kinds': [
      \ 'e:enums:0:1',
      \ 'f:function:0:1',
      \ 't:typealias:0:1',
      \ 'M:Module:0:1',
      \ 'I:import:0:1',
      \ 'i:interface:0:1',
      \ 'C:class:0:1',
      \ 'm:method:0:1',
      \ 'p:property:0:1',
      \ 'v:variable:0:1',
      \ 'c:const:0:1',
    \ ],
    \ 'sort' : 0
  \ }
'''

[[plugins]]
repo = 'morhetz/gruvbox'
hook_add = '''
  set background=dark
  au VimEnter * nested colorscheme gruvbox | highlight Normal guibg=NONE
'''

[[plugins]]
repo = 'luochen1990/rainbow'

[[plugins]]
repo = 'nvim-neo-tree/neo-tree.nvim'
rev = 'v3.x'
depends = ['plenary.nvim', 'nui.nvim', 'nvim-web-devicons']
lazy = 0
hook_add = '''
lua << EOF
local git_hash = require("neo_tree_git_hash")
git_hash.setup()
require("neo-tree").setup({
  filesystem = {
    components = {
      git_hash = git_hash.component,
    },
  },
  renderers = {
    file = {
      { "indent" },
      { "icon" },
      {
        "container",
        content = {
          { "name", zindex = 10 },
          { "symlink_target", zindex = 10 },
          { "clipboard", zindex = 10 },
          { "modified", zindex = 20, align = "right" },
          { "diagnostics", zindex = 20, align = "right" },
          { "git_status", zindex = 10, align = "right" },
          { "git_hash", zindex = 10, align = "right" },
        },
      },
    },
  },
})
EOF
'''

